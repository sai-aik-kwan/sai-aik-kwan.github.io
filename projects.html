<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Homelab projects by Sai Aik Kwan - Networking & Cybersecurity portfolio">
    <title>Projects - Sai Aik Kwan's Homelab Portfolio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- PAGE HEADER -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title">Homelab Projects</h1>
            <p class="page-subtitle">Hands-on networking and cybersecurity projects documented on GitHub</p>
            <a href="https://github.com/sai-aik-kwan" target="_blank" class="github-header-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.26.82-.58 0-.287-.01-1.05-.015-2.06-3.338.726-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.73.083-.73 1.205.085 1.838 1.237 1.838 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.468-2.38 1.235-3.22-.123-.3-.535-1.523.117-3.176 0 0 1.008-.322 3.3 1.23.96-.267 1.98-.4 3-.405 1.02.005 2.04.138 3 .405 2.29-1.552 3.297-1.23 3.297-1.23.653 1.653.24 2.876.118 3.176.768.84 1.233 1.91 1.233 3.22 0 4.61-2.804 5.62-5.476 5.92.43.37.824 1.102.824 2.222 0 1.604-.015 2.896-.015 3.287 0 .322.216.698.83.578C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
                </svg>
                github.com/sai-aik-kwan
            </a>
        </div>
    </section>

    <!-- PROJECTS FILTER -->
    <section class="projects-filter">
        <div class="container">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All Projects</button>
                <button class="filter-btn" data-filter="networking">Networking</button>
                <button class="filter-btn" data-filter="security">Security</button>
                <button class="filter-btn" data-filter="automation">Automation</button>
            </div>
        </div>
    </section>

    <!-- ALL PROJECTS GRID -->
    <section class="all-projects">
        <div class="container">
            <div class="projects-grid full-grid" id="allProjects"></div>
            
            <div class="more-projects-cta">
                <p>More projects available on my GitHub</p>
                <a href="https://github.com/sai-aik-kwan" target="_blank" class="btn btn-primary">
                    Explore GitHub Repository
                </a>
            </div>
        </div>
    </section>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/components.js"></script>
    <script>
        // Populate all projects
        (function() {
            const d = portfolioData;
            let html = '';
            d.projects.forEach(project => {
                const firstTech = project.technologies[0].toLowerCase();
                let category = 'networking';
                if (firstTech.includes('kali') || firstTech.includes('nmap') || firstTech.includes('security') || firstTech.includes('wireshark') || firstTech.includes('firewall')) {
                    category = 'security';
                } else if (firstTech.includes('python') || firstTech.includes('bash') || firstTech.includes('powershell') || firstTech.includes('zabbix')) {
                    category = 'automation';
                } else if (firstTech.includes('windows') || firstTech.includes('active') || firstTech.includes('group')) {
                    category = 'security';
                }
                
                html += `
                <div class="project-card" data-category="${category}">
                    <div class="project-image">
                        <img src="assets/images/${project.image}" alt="${project.title}" onerror="this.src='https://via.placeholder.com/400x250/1a1a2e/00ff88?text=Homelab+Project'">
                    </div>
                    <div class="project-content">
                        <h3 class="project-title">${project.title}</h3>
                        <p class="project-description">${project.description}</p>
                        <div class="project-tech">
                            ${project.technologies.map(tech => `<span class="tech-tag">${tech}</span>`).join('')}
                        </div>
                        <a href="${project.github_url}" target="_blank" class="project-link">View on GitHub →</a>
                    </div>
                </div>`;
            });
            document.getElementById('allProjects').innerHTML = html;
        })();
    </script>
    <script src="assets/js/main.js"></script>
</body>
</html>
